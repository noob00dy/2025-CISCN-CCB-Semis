<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <main class="page">
    <section class="card" aria-label="登录">
      <header class="card__header">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <h1 class="title">欢迎回来</h1>
        </div>
        <p class="subtitle">请输入账号和密码登录。演示项目默认账号为 <code>admin</code>。</p>
      </header>

      <div class="card__body">
        {% if error %}
          <div class="alert" role="alert">{{ error }}</div>
        {% endif %}

        <form class="form" method="post" action="{{ url_for('login') }}" autocomplete="on">
          <div class="field">
            <label for="username">用户名</label>
            <input class="input" id="username" name="username" type="text" placeholder="请输入用户名" value="{{ username or '' }}" required />
          </div>

          <div class="field">
            <label for="password">密码</label>
            <input class="input" id="password" name="password" type="password" placeholder="请输入密码" required />
          </div>

          <div class="row">
            <label class="checkbox">
              <input type="checkbox" name="remember" value="1" />
              <span>记住我</span>
            </label>
            <a class="link" href="{{ url_for('home') }}" aria-label="返回首页">返回首页</a>
          </div>

          <button class="button" type="submit">登录</button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
