<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>留言板</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <main class="page">
    <section class="card" aria-label="留言板">
      <header class="card__header">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <h1 class="title">留言板</h1>
        </div>
        <p class="subtitle">以 <code>{{ user }}</code> 身份发言。</p>
      </header>

      <div class="card__body">
        <form class="form" method="post">
          <div class="field">
            <label for="content">留言内容</label>
            <input class="input" id="content" name="content" type="text" placeholder="说点什么..." required />
          </div>
          <button class="button" type="submit">发布</button>
          <a class="link" href="{{ url_for('dashboard') }}">返回后台</a>
        </form>

        <p class="subtitle" style="margin-top:14px;">最新 50 条：</p>
        {% for m in messages %}
          <div class="alert" style="margin-top:10px; border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.06);">
            <div style="display:flex; justify-content:space-between; gap:12px;">
              <strong>{{ m['username'] }}</strong>
              <span style="opacity:.7; font-size:12px;">{{ m['created_at'] }}</span>
            </div>
            <div style="margin-top:6px;">{{ m['content'] }}</div>
          </div>
        {% endfor %}
      </div>
    </section>
  </main>
</body>
</html>
