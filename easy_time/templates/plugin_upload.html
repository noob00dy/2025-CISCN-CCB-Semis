<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>插件上传</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <main class="page">
    <section class="card" aria-label="插件上传">
      <header class="card__header">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <h1 class="title">插件上传</h1>
        </div>
        <p class="subtitle">上传 zip 插件包并安全解压（已做路径校验）。</p>
      </header>

      <div class="card__body">
        {% if error %}<div class="alert" role="alert">{{ error }}</div>{% endif %}
        {% if ok %}<div class="alert" role="status" style="border-color: rgba(34,211,238,0.35); background: rgba(34,211,238,0.12);">{{ ok }}</div>{% endif %}

        <form class="form" method="post" enctype="multipart/form-data">
          <div class="field">
            <label for="plugin">zip 文件</label>
            <input class="input" id="plugin" name="plugin" type="file" accept=".zip,application/zip" required />
          </div>
          <button class="button" type="submit">上传并解压</button>
          <a class="link" href="{{ url_for('dashboard') }}">返回后台</a>
        </form>

        {% if files %}
          <p class="subtitle" style="margin-top:12px;">解压清单：</p>
          <div class="alert" style="border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.06);">
            <pre style="margin:0; white-space:pre-wrap;">{{ files|join('\n') }}</pre>
          </div>
        {% endif %}
      </div>
    </section>
  </main>
</body>
</html>
